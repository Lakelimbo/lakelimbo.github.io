---
layout: default
---

{{ content }}

{% assign posts = site.posts %}

{%- if posts.size > 0 -%}
    <div id="postGrid">
        {%- for post in posts -%}
        <div class="postItem">
            <h4>{{ post.title | escape }}</h4>
            <p>{{ post.excerpt }}</p>
        </div>
        {%- endfor -%}
    </div>
{%- endif -%}
